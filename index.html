<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>Gym</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; background: #0f1419; color: #e5e7eb; }
    .auth-banner { padding: 10px 20px; background: #422006; color: #fde68a; font-size: 0.9rem; }
    .app-header { background: #0b1220; color: #fff; padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #233041; }
    .app-header-logo { height: 36px; width: auto; margin-right: 10px; }
    .header-main { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .header-title-line { font-size: 1rem; font-weight: 700; white-space: nowrap; }
    .header-title-line .ver { font-weight: 600; opacity: 0.9; font-size: 0.92rem; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-user { font-size: 0.72rem; color: #93c5fd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }
    .meta-strip { padding: 6px 16px; font-size: 0.72rem; color: #9ccce6; background: #0b1220; border-bottom: 1px solid #233041; }
    /* Tab bar */
    .tab-bar { display: flex; align-items: center; background: #111827; border-bottom: 1px solid #233041; padding: 0 8px; }
    .view-tab { background: transparent; border: none; color: #94a3b8; padding: 11px 14px; font-size: 0.88rem; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1px; font-family: inherit; align-self: stretch; }
    .view-tab:hover { color: #e5e7eb; }
    .view-tab.active { color: #fff; border-bottom-color: #2ed3c6; font-weight: 600; }
    .tab-spacer { flex: 1; }
    .btn-new { background: #2ed3c6; color: #06212b; border: none; border-radius: 8px; padding: 7px 16px; font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-new:disabled { opacity: 0.55; cursor: not-allowed; }
    /* Panels */
    .panel { padding: 14px 16px; max-width: 720px; margin: 0 auto; }
    /* Edit panel */
    .edit-panel { background: #111827; border: 1px solid #2ed3c6; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
    .edit-panel-title { font-size: 0.82rem; color: #2ed3c6; font-weight: 600; margin-bottom: 12px; }
    .edit-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .edit-field { flex: 1; min-width: 100px; }
    .edit-field label { display: block; font-size: 0.75rem; color: #9ccce6; margin-bottom: 3px; }
    .edit-field input[type=date],
    .edit-field input[type=time] { width: 100%; padding: 7px 9px; border: 1px solid #2b4258; border-radius: 7px; background: #0b1220; color: #e5e7eb; font-size: 0.9rem; font-family: inherit; }
    .edit-field textarea { width: 100%; padding: 7px 9px; border: 1px solid #2b4258; border-radius: 7px; background: #0b1220; color: #e5e7eb; font-size: 0.9rem; font-family: inherit; min-height: 56px; resize: vertical; }
    .count-row { margin-bottom: 10px; }
    .count-row label { display: block; font-size: 0.75rem; color: #9ccce6; margin-bottom: 4px; }
    .count-btns { display: flex; flex-wrap: wrap; gap: 4px; }
    .count-btn { width: 30px; height: 30px; border: 1px solid #2b4258; border-radius: 6px; background: #0b1220; color: #94a3b8; font-size: 0.82rem; cursor: pointer; font-family: inherit; padding: 0; }
    .count-btn.active { background: #2ed3c6; color: #06212b; border-color: #2ed3c6; font-weight: 700; }
    .club-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 0.88rem; color: #e5e7eb; cursor: pointer; user-select: none; }
    .club-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #2ed3c6; }
    .ts-btns { display: flex; gap: 8px; margin-bottom: 10px; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-family: inherit; }
    .btn-primary { background: #2ed3c6; color: #06212b; font-weight: 700; }
    .btn-ghost { background: transparent; border: 1px solid #2b4258; color: #94a3b8; }
    .btn-ts { background: #1e3a4a; border: 1px solid #2b4258; color: #93c5fd; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .edit-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    /* Records table */
    .table-wrap { overflow-x: auto; }
    table.data-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .data-table th, .data-table td { border: 1px solid #1e2d3d; padding: 7px 8px; text-align: left; }
    .data-table th { background: #0b1220; color: #9ccce6; font-weight: 600; white-space: nowrap; }
    .data-table tbody tr { cursor: pointer; }
    .data-table tbody tr:hover { background: #131f2e; }
    .data-table tbody tr.selected { background: #0d2535; }
    .club-tag { display: inline-block; background: #1e3a4a; color: #93c5fd; border-radius: 4px; padding: 1px 5px; font-size: 0.72rem; font-weight: 600; }
    .notes-cell { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #94a3b8; }
    .btn-del { background: none; border: none; color: #6b7280; cursor: pointer; padding: 2px 5px; font-size: 1rem; border-radius: 4px; line-height: 1; }
    .btn-del:hover { color: #ef4444; background: #1e2d3d; }
    /* Dashboard */
    .dash-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .dash-cards { display: flex; flex-direction: column; gap: 0; }
    .dash-card { flex: 1; background: #111827; border: 1px solid #233041; border-radius: 10px; padding: 12px; min-width: 0; }
    .dash-card .k { font-size: 0.72rem; color: #94a3b8; }
    .dash-card .v { font-size: 1.15rem; font-weight: 700; color: #e5e7eb; margin-top: 4px; }
    .empty { color: #94a3b8; padding: 24px; text-align: center; }
    .section-title { font-size: 0.9rem; font-weight: 600; color: #9ccce6; margin: 0 0 12px; }
    .msg-ok { color: #6ee7b7; font-size: 0.86rem; }
    .msg-err { color: #fca5a5; font-size: 0.86rem; }
  </style>
</head>
<body>
  <div id="auth-gate" class="auth-banner" style="display:none;"></div>
  <header class="app-header">
    <img class="app-header-logo" src="./app_logo.jpg" alt="" width="36" height="36" />
    <div class="header-main">
      <div class="header-title-line">Gym <span class="ver" id="verInline"></span></div>
      <div class="header-right">
        <div class="header-user" id="headerUser"></div>
      </div>
    </div>
  </header>
  <div class="meta-strip" id="metaStrip">読み込み中…</div>

  <div class="tab-bar">
    <button type="button" class="view-tab active" data-view="records">記録</button>
    <button type="button" class="view-tab" data-view="dash">ダッシュボード</button>
    <span class="tab-spacer"></span>
    <button type="button" class="btn-new" id="btnNew">新規</button>
  </div>

  <!-- Records view -->
  <main id="viewRecords" class="panel">
    <div id="editPanel" class="edit-panel" style="display:none;">
      <div class="edit-panel-title" id="editPanelTitle">記録を編集</div>
      <div class="edit-row">
        <div class="edit-field">
          <label>日付</label>
          <input type="date" id="editDate" />
        </div>
        <div class="edit-field">
          <label>開始</label>
          <input type="time" id="editStart" />
        </div>
        <div class="edit-field">
          <label>終了</label>
          <input type="time" id="editEnd" />
        </div>
      </div>
      <div class="count-row">
        <label>有酸素人数</label>
        <div class="count-btns" id="cntAero"></div>
      </div>
      <div class="count-row">
        <label>TR1 人数</label>
        <div class="count-btns" id="cntTr1"></div>
      </div>
      <div class="count-row">
        <label>TR2 人数</label>
        <div class="count-btns" id="cntTr2"></div>
      </div>
      <div class="edit-field" style="margin-bottom:10px;">
        <label>メモ</label>
        <textarea id="editNotes" rows="2"></textarea>
      </div>
      <label class="club-row">
        <input type="checkbox" id="editClub" />
        快活CLUB
      </label>
      <div class="ts-btns">
        <button type="button" class="btn btn-ts" id="btnStampEdit">編集</button>
        <button type="button" class="btn btn-ts" id="btnStampEnd">終了</button>
      </div>
      <div class="edit-actions">
        <button type="button" class="btn btn-primary" id="btnSaveEdit">保存</button>
        <button type="button" class="btn btn-ghost" id="btnCancelEdit">キャンセル</button>
        <span id="editMsg"></span>
      </div>
    </div>
    <div id="recEmpty" class="empty" style="display:none;">記録がありません</div>
    <div class="table-wrap">
      <table class="data-table" id="tblRecords" style="display:none;">
        <thead>
          <tr>
            <th>日付</th><th>開始〜終了</th><th>有酸</th><th>TR1</th><th>TR2</th><th>C</th><th>メモ</th><th></th>
          </tr>
        </thead>
        <tbody id="tblRecordsBody"></tbody>
      </table>
    </div>
  </main>

  <!-- Dashboard view -->
  <main id="viewDash" class="panel" style="display:none;">
    <p class="section-title">直近30日</p>
    <div class="dash-cards" id="dashCards"></div>
    <div id="dashEmpty" class="empty" style="display:none;">データがありません</div>
  </main>

  <script>
    window.__CONFIG_URL__ = 'https://script.google.com/macros/s/AKfycbyHavAxE_M6X8irQFverVbe0FKbubaYtQ5jP-zd3r7bRzEXW6aKTjE4oLrT3VBPuLew/exec';
    window.__API_BASE__ = window.__CONFIG_URL__;
    window.__LIFF_ID__ = '';
    window.__APP_VERSION__ = '';

    // ---- Utilities ----
    function todayJstYmd() {
      var parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit'
      }).formatToParts(new Date());
      var y = '', m = '', d = '';
      for (var i = 0; i < parts.length; i++) {
        if (parts[i].type === 'year') y = parts[i].value;
        if (parts[i].type === 'month') m = parts[i].value;
        if (parts[i].type === 'day') d = parts[i].value;
      }
      return y + '-' + m + '-' + d;
    }

    function nowJstHm() {
      var d = new Date();
      var parts = new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit', hour12: false
      }).formatToParts(d);
      var h = '', m = '';
      for (var i = 0; i < parts.length; i++) {
        if (parts[i].type === 'hour') h = parts[i].value.padStart(2, '0');
        if (parts[i].type === 'minute') m = parts[i].value.padStart(2, '0');
      }
      return h + ':' + m;
    }

    function minutesBetween(ts, te, ymd) {
      var ma = String(ts || '').match(/^(\d{1,2}):(\d{2})$/);
      var mb = String(te || '').match(/^(\d{1,2}):(\d{2})$/);
      if (!ma || !mb) return null;
      var d0 = new Date(ymd + 'T' + ma[1].padStart(2,'0') + ':' + ma[2] + ':00+09:00');
      var d1 = new Date(ymd + 'T' + mb[1].padStart(2,'0') + ':' + mb[2] + ':00+09:00');
      if (isNaN(d0) || isNaN(d1)) return null;
      var diff = (d1 - d0) / 60000;
      if (diff < 0) diff += 1440;
      return Math.round(diff);
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    // ---- Config & Auth ----
    async function fetchConfig() {
      var res = await fetch(window.__CONFIG_URL__ + '?_path=config');
      var c = await res.json();
      window.__LIFF_ID__ = c.liff_id || '';
      window.__APP_VERSION__ = c.version || '';
    }

    function applyVersionLabel() {
      var ver = String(window.__APP_VERSION__ || '').trim();
      var verText = ver ? ('v' + ver) : '';
      document.getElementById('verInline').textContent = verText;
      document.title = 'Gym' + (verText ? ' ' + verText : '');
    }

    var DEV_TOKEN = new URLSearchParams(location.search).get('dev') || '';
    var IS_DEV_BYPASS = DEV_TOKEN.length > 0;
    var lineUserId = '';

    function apiUrl(path) {
      var b = (window.__API_BASE__ || '').replace(/\/$/, '');
      var parts = path.split('?');
      var url = b + '?_path=' + encodeURIComponent(parts[0]);
      if (parts[1]) url += '&' + parts[1];
      return url;
    }

    function loadScript(src) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = src; s.onload = resolve;
        s.onerror = function() { reject(new Error('script load failed')); };
        document.head.appendChild(s);
      });
    }

    async function fetchWithAuth(path, options) {
      var o = options || {};
      var method = (o.method || 'GET').toUpperCase();
      if (method === 'POST' && o.body) {
        var b = JSON.parse(o.body);
        b.userId = lineUserId;
        b._path = path.split('?')[0];
        if (IS_DEV_BYPASS) b.dev_token = DEV_TOKEN;
        o = Object.assign({}, o, { body: JSON.stringify(b) });
        var q = IS_DEV_BYPASS
          ? '&dev_token=' + encodeURIComponent(DEV_TOKEN) + '&userId=dev-claude'
          : '&userId=' + encodeURIComponent(lineUserId || '');
        return fetch(window.__API_BASE__, Object.assign({}, o, { method: 'POST' })).catch(function() {
          return fetch(apiUrl(path) + q, o);
        });
      }
      var q = IS_DEV_BYPASS
        ? '&dev_token=' + encodeURIComponent(DEV_TOKEN) + '&userId=dev-claude'
        : '&userId=' + encodeURIComponent(lineUserId || '');
      return fetch(apiUrl(path) + q, o);
    }

    async function apiMe() {
      var r = await fetchWithAuth('auth/me');
      return r.json();
    }

    async function apiListVisits(from, to) {
      var q = (from && to) ? ('from=' + encodeURIComponent(from) + '&to=' + encodeURIComponent(to)) : '';
      var r = await fetchWithAuth('api/gym/visits' + (q ? '?' + q : ''));
      return r.json();
    }

    async function apiDeleteVisit(id) {
      var q = IS_DEV_BYPASS
        ? '&dev_token=' + encodeURIComponent(DEV_TOKEN) + '&userId=dev-claude'
        : '&userId=' + encodeURIComponent(lineUserId || '');
      var url = apiUrl('api/gym/visits/delete') + q + '&id=' + encodeURIComponent(id);
      var r = await fetch(url);
      return r.json();
    }

    async function apiSaveVisit(payload) {
      try {
        var r = await fetchWithAuth('api/gym/visits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.assign({ _path: 'api/gym/visits' }, payload))
        });
        return r.json();
      } catch (postErr) {
        var q = new URLSearchParams();
        Object.keys(payload).forEach(function(k) {
          q.set(k, payload[k] == null ? '' : String(payload[k]));
        });
        var r2 = await fetchWithAuth('api/gym/visits/save?' + q.toString());
        return r2.json();
      }
    }

    function setMeta(s) { document.getElementById('metaStrip').textContent = s; }

    // ---- State ----
    var allRecords = [];
    var editDraft = {};
    var editingId = null;
    var dashLoaded = false;

    // ---- Tab switching ----
    function switchView(name) {
      document.querySelectorAll('.view-tab').forEach(function(t) {
        t.classList.toggle('active', t.getAttribute('data-view') === name);
      });
      document.getElementById('viewRecords').style.display = name === 'records' ? 'block' : 'none';
      document.getElementById('viewDash').style.display = name === 'dash' ? 'block' : 'none';
      if (name === 'dash') loadDashboard();
      if (name === 'records') renderRecordsTable();
    }

    document.querySelectorAll('.view-tab').forEach(function(btn) {
      btn.addEventListener('click', function() { switchView(btn.getAttribute('data-view')); });
    });

    // ---- Count buttons ----
    function renderCountBtns(containerId, field) {
      var container = document.getElementById(containerId);
      container.innerHTML = '';
      for (var i = 0; i <= 10; i++) {
        (function(val) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = val;
          btn.className = 'count-btn' + (editDraft[field] === val ? ' active' : '');
          btn.addEventListener('click', function() {
            editDraft[field] = val;
            renderCountBtns(containerId, field);
          });
          container.appendChild(btn);
        })(i);
      }
    }

    // ---- Edit panel ----
    function openEdit(rec) {
      editingId = rec.id || null;
      editDraft = {
        id: rec.id || '',
        visit_date: String(rec.visit_date || '').slice(0, 10),
        time_start: String(rec.time_start || '').slice(0, 5),
        time_end: String(rec.time_end || '').slice(0, 5),
        aerobic_minutes: parseInt(rec.aerobic_minutes, 10) || 0,
        tr1_people: parseInt(rec.tr1_people, 10) || 0,
        tr2_people: parseInt(rec.tr2_people, 10) || 0,
        notes: String(rec.notes || ''),
        club: rec.club === true || rec.club === 'true',
      };
      document.getElementById('editPanelTitle').textContent = editingId ? '記録を編集' : '新規記録';
      document.getElementById('editDate').value = editDraft.visit_date;
      document.getElementById('editStart').value = editDraft.time_start;
      document.getElementById('editEnd').value = editDraft.time_end;
      document.getElementById('editNotes').value = editDraft.notes;
      document.getElementById('editClub').checked = editDraft.club;
      document.getElementById('editMsg').innerHTML = '';
      renderCountBtns('cntAero', 'aerobic_minutes');
      renderCountBtns('cntTr1', 'tr1_people');
      renderCountBtns('cntTr2', 'tr2_people');
      document.getElementById('editPanel').style.display = 'block';
      document.getElementById('viewRecords').scrollTop = 0;
      highlightSelected();
    }

    function closeEdit() {
      editingId = null;
      editDraft = {};
      document.getElementById('editPanel').style.display = 'none';
      document.getElementById('editMsg').innerHTML = '';
      document.querySelectorAll('#tblRecordsBody tr').forEach(function(tr) {
        tr.classList.remove('selected');
      });
    }

    function highlightSelected() {
      document.querySelectorAll('#tblRecordsBody tr').forEach(function(tr) {
        tr.classList.toggle('selected', tr.getAttribute('data-id') === String(editingId || ''));
      });
    }

    function syncDraftFromForm() {
      editDraft.visit_date = document.getElementById('editDate').value;
      editDraft.time_start = document.getElementById('editStart').value.slice(0, 5);
      editDraft.time_end = document.getElementById('editEnd').value.slice(0, 5);
      editDraft.notes = document.getElementById('editNotes').value;
      editDraft.club = document.getElementById('editClub').checked;
    }

    async function saveEditDraft(keepOpen) {
      syncDraftFromForm();
      var btn = document.getElementById('btnSaveEdit');
      btn.disabled = true;
      document.getElementById('editMsg').innerHTML = '';
      try {
        var payload = {
          id: editDraft.id,
          visit_date: editDraft.visit_date,
          time_start: editDraft.time_start,
          time_end: editDraft.time_end,
          aerobic_minutes: editDraft.aerobic_minutes,
          tr1_people: editDraft.tr1_people,
          tr2_people: editDraft.tr2_people,
          notes: editDraft.notes,
          club: editDraft.club,
        };
        var r = await apiSaveVisit(payload);
        if (r.error) throw new Error(r.error);
        var saved = r.visit;
        var idx = allRecords.findIndex(function(v) { return v.id === saved.id; });
        if (idx >= 0) allRecords[idx] = saved; else allRecords.push(saved);
        dashLoaded = false;
        renderRecordsTable();
        if (keepOpen) {
          document.getElementById('editMsg').innerHTML = '<span class="msg-ok">保存しました</span>';
          highlightSelected();
        } else {
          closeEdit();
        }
      } catch (e) {
        document.getElementById('editMsg').innerHTML = '<span class="msg-err">' + esc(String(e.message || e)) + '</span>';
      }
      btn.disabled = false;
    }

    // Timestamp: 編集 = stamp time_end + save, keep open
    document.getElementById('btnStampEdit').addEventListener('click', function() {
      var t = nowJstHm();
      document.getElementById('editEnd').value = t;
      editDraft.time_end = t;
      saveEditDraft(true);
    });

    // Timestamp: 終了 = stamp time_end + save + close
    document.getElementById('btnStampEnd').addEventListener('click', function() {
      var t = nowJstHm();
      document.getElementById('editEnd').value = t;
      editDraft.time_end = t;
      saveEditDraft(false);
    });

    document.getElementById('btnSaveEdit').addEventListener('click', function() {
      saveEditDraft(false);
    });

    document.getElementById('btnCancelEdit').addEventListener('click', closeEdit);

    // ---- Records table ----
    function renderRecordsTable() {
      var sorted = allRecords.slice().sort(function(a, b) {
        var da = String(a.visit_date || '').slice(0, 10);
        var db = String(b.visit_date || '').slice(0, 10);
        if (da !== db) return da > db ? -1 : 1;
        return String(a.time_start || '') > String(b.time_start || '') ? -1 : 1;
      });
      var empty = document.getElementById('recEmpty');
      var tbl = document.getElementById('tblRecords');
      if (sorted.length === 0) {
        empty.style.display = 'block';
        tbl.style.display = 'none';
        return;
      }
      empty.style.display = 'none';
      tbl.style.display = 'table';
      var html = '';
      for (var i = 0; i < sorted.length; i++) {
        var v = sorted[i];
        var ymd = String(v.visit_date || '').slice(0, 10);
        var dateDisp = ymd.slice(5).replace('-', '/');
        var timeRange = esc(v.time_start || '');
        if (v.time_end) timeRange += '〜' + esc(v.time_end);
        var clubCell = v.club ? '<span class="club-tag">C</span>' : '';
        var sel = String(v.id) === String(editingId || '') ? ' class="selected"' : '';
        html += '<tr data-id="' + esc(v.id) + '"' + sel + '>' +
          '<td>' + dateDisp + '</td>' +
          '<td style="white-space:nowrap;">' + timeRange + '</td>' +
          '<td>' + esc(v.aerobic_minutes || 0) + '</td>' +
          '<td>' + esc(v.tr1_people || 0) + '</td>' +
          '<td>' + esc(v.tr2_people || 0) + '</td>' +
          '<td>' + clubCell + '</td>' +
          '<td class="notes-cell">' + esc(v.notes || '') + '</td>' +
          '<td><button class="btn-del" data-del-id="' + esc(v.id) + '" title="削除">×</button></td>' +
          '</tr>';
      }
      document.getElementById('tblRecordsBody').innerHTML = html;
      document.querySelectorAll('#tblRecordsBody tr').forEach(function(tr) {
        tr.addEventListener('click', function() {
          var id = tr.getAttribute('data-id');
          if (String(editingId || '') === id) {
            closeEdit();
            return;
          }
          var rec = allRecords.find(function(v) { return String(v.id) === id; });
          if (rec) openEdit(rec);
        });
      });
      document.querySelectorAll('.btn-del').forEach(function(btn) {
        btn.addEventListener('click', async function(e) {
          e.stopPropagation();
          var id = btn.getAttribute('data-del-id');
          if (!confirm('この記録を削除しますか？')) return;
          try {
            var r = await apiDeleteVisit(id);
            if (r.error) throw new Error(r.error);
            allRecords = allRecords.filter(function(v) { return v.id !== id; });
            if (editingId === id) closeEdit();
            dashLoaded = false;
            renderRecordsTable();
          } catch (ex) {
            alert('削除エラー: ' + String(ex.message || ex));
          }
        });
      });
    }

    async function loadRecords() {
      try {
        var j = await apiListVisits('2020-01-01', todayJstYmd());
        if (j.ok && j.visits) {
          allRecords = j.visits;
          renderRecordsTable();
        } else {
          document.getElementById('recEmpty').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('recEmpty').style.display = 'block';
      }
    }

    // ---- New record button ----
    document.getElementById('btnNew').addEventListener('click', async function() {
      var btn = this;
      btn.disabled = true;
      try {
        var r = await apiSaveVisit({ visit_date: todayJstYmd(), time_start: nowJstHm() });
        if (r.error) throw new Error(r.error);
        var saved = r.visit;
        var idx = allRecords.findIndex(function(v) { return v.id === saved.id; });
        if (idx >= 0) allRecords[idx] = saved; else allRecords.push(saved);
        dashLoaded = false;
        switchView('records');
        renderRecordsTable();
        openEdit(saved);
      } catch (e) {
        alert('エラー: ' + String(e.message || e));
      }
      btn.disabled = false;
    });

    // ---- Dashboard ----
    async function loadDashboard() {
      if (dashLoaded) return;
      var today = todayJstYmd();
      var from = (function() {
        var parts = new Intl.DateTimeFormat('en-CA', {
          timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit'
        }).formatToParts(new Date(Date.now() - 30 * 86400000));
        var y = '', m = '', dd = '';
        for (var i = 0; i < parts.length; i++) {
          if (parts[i].type === 'year') y = parts[i].value;
          if (parts[i].type === 'month') m = parts[i].value;
          if (parts[i].type === 'day') dd = parts[i].value;
        }
        return y + '-' + m + '-' + dd;
      })();

      var j;
      try { j = await apiListVisits(from, today); }
      catch (e) { document.getElementById('dashEmpty').style.display = 'block'; return; }

      if (j.error || !j.ok || !j.visits || !j.visits.length) {
        document.getElementById('dashEmpty').style.display = 'block';
        document.getElementById('dashCards').innerHTML = '';
        return;
      }
      dashLoaded = true;

      var rows = j.visits;
      var n = rows.length;
      var sumStay = 0, stayCount = 0, sumAero = 0, sumTr1 = 0, sumTr2 = 0, clubCount = 0;
      for (var k = 0; k < rows.length; k++) {
        var v = rows[k];
        var stay = minutesBetween(v.time_start, v.time_end, String(v.visit_date || '').slice(0, 10));
        if (typeof stay === 'number') { sumStay += stay; stayCount++; }
        sumAero += parseInt(v.aerobic_minutes, 10) || 0;
        sumTr1 += parseInt(v.tr1_people, 10) || 0;
        sumTr2 += parseInt(v.tr2_people, 10) || 0;
        if (v.club === true) clubCount++;
      }
      var avgStay = stayCount ? Math.round(sumStay / stayCount) : 0;

      function card(k, v) {
        return '<div class="dash-card"><div class="k">' + esc(k) + '</div><div class="v">' + esc(v) + '</div></div>';
      }
      function row(cards) {
        return '<div class="dash-row">' + cards + '</div>';
      }

      document.getElementById('dashEmpty').style.display = 'none';
      document.getElementById('dashCards').innerHTML =
        row(card('記録数', n + '回') + card('Club利用数', clubCount + '回')) +
        row(card('1回当たり', n ? '¥' + Math.round(7678 / n).toLocaleString('ja-JP') : '-') + card('Club 1回', clubCount ? '¥' + Math.round(1650 / clubCount).toLocaleString('ja-JP') : '-')) +
        row(card('滞在合計', sumStay + '分') + card('平均滞在', avgStay + '分')) +
        row(card('有酸素平均', (sumAero / n).toFixed(1) + '人') + card('TR1 平均', (sumTr1 / n).toFixed(1) + '人') + card('TR2 平均', (sumTr2 / n).toFixed(1) + '人'));
    }

    // ---- Init ----
    (async function main() {
      try {
        if (!window.__CONFIG_URL__ || window.__CONFIG_URL__.indexOf('__GAS_CONFIG') >= 0) {
          setMeta('GAS の Web アプリ URL を index.html の __CONFIG_URL__ に設定してください');
          return;
        }
        await fetchConfig();
        applyVersionLabel();
        await loadScript('https://static.line-scdn.net/liff/edge/2/sdk.js');
        var liffId = (window.__LIFF_ID__ || '').trim();
        if (!liffId) { setMeta('LIFF_ID 未設定（GAS config）'); return; }
        await liff.init({ liffId: liffId });
        if (!liff.isLoggedIn()) { liff.login({ redirectUri: location.href.split('#')[0] }); return; }
        var prof = await liff.getProfile();
        lineUserId = prof.userId;
        document.getElementById('headerUser').textContent = prof.displayName || lineUserId;
        var me = await apiMe();
        if (!me.ok || !me.access_granted) {
          setMeta('この LINE アカウントは未許可です（GAS の ALLOWED_USER_IDS に userId を追加）');
          return;
        }
        setMeta('接続済み · ' + todayJstYmd());
        loadRecords();
      } catch (e) {
        var em = String((e && e.message) ? e.message : e || '').trim();
        setMeta('初期化エラー: ' + (em || 'unknown'));
      }
    })();
  </script>
</body>
</html>
