<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>Gym</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; background: #0f1419; color: #e5e7eb; }
    .app-header { background: #0b1220; color: #fff; padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #233041; }
    .app-header-logo { height: 36px; width: auto; margin-right: 10px; }
    .header-main { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: space-between; }
    .header-title-line { font-size: 1rem; font-weight: 700; }
    .ver { font-weight: 600; opacity: 0.9; font-size: 0.92rem; }
    .header-user { font-size: 0.72rem; color: #93c5fd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
    .meta-strip { padding: 6px 16px; font-size: 0.72rem; color: #9ccce6; background: #0b1220; border-bottom: 1px solid #233041; }
    .tab-bar { display: flex; align-items: center; background: #111827; border-bottom: 1px solid #233041; padding: 0 8px; }
    .view-tab { background: transparent; border: none; color: #94a3b8; padding: 11px 14px; font-size: 0.88rem; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1px; font-family: inherit; align-self: stretch; }
    .view-tab:hover { color: #e5e7eb; }
    .view-tab.active { color: #fff; border-bottom-color: #2ed3c6; font-weight: 600; }
    .tab-spacer { flex: 1; }
    .btn-new { background: #2ed3c6; color: #06212b; border: none; border-radius: 8px; padding: 7px 16px; font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-new:disabled { opacity: 0.55; cursor: not-allowed; }
    .panel { padding: 12px 12px; max-width: 720px; margin: 0 auto; }
    /* Records table */
    .table-wrap { overflow-x: auto; }
    table.rec-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .rec-table th, .rec-table td { border: 1px solid #1e2d3d; padding: 7px 6px; text-align: left; white-space: nowrap; }
    .rec-table th { background: #0b1220; color: #9ccce6; font-weight: 600; font-size: 0.78rem; }
    .rec-table tbody tr.row-saving { opacity: 0.55; }
    .rec-table tbody tr.row-saving td { pointer-events: none; }
    .cell-edit { cursor: pointer; }
    .cell-edit:hover { background: #1a2d3e; }
    .cell-edit:active { background: #1e3040; }
    .saving-txt { font-size: 0.72rem; color: #9ccce6; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .club-on { color: #93c5fd; font-weight: 700; }
    .club-off { color: #4b5563; }
    /* 送迎ボタン */
    .sougen-cell { display: flex; gap: 4px; }
    .sg-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #2b4258; background: #1a2535; color: #6b7280; font-size: 0.8rem; font-weight: 700; cursor: pointer; font-family: inherit; padding: 0; line-height: 26px; text-align: center; }
    .sg-btn.on { background: #16a34a; color: #fff; border-color: #16a34a; }
    .sg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-delete { background: transparent; border: 1px solid #374151; color: #ef4444; border-radius: 6px; padding: 3px 8px; font-size: 0.75rem; cursor: pointer; font-family: inherit; }
    .btn-delete:hover { background: #1c0a0a; border-color: #ef4444; }
    .btn-delete:disabled { opacity: 0.4; cursor: not-allowed; }
    /* Popup */
    .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .popup-box { background: #111827; border: 1px solid #2b4258; border-radius: 14px; padding: 20px 20px 16px; width: 90%; max-width: 320px; }
    .popup-title { font-size: 0.88rem; color: #2ed3c6; font-weight: 600; margin-bottom: 16px; text-align: center; }
    .popup-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-family: inherit; }
    .btn-primary { background: #2ed3c6; color: #06212b; font-weight: 700; }
    .btn-ghost { background: transparent; border: 1px solid #2b4258; color: #94a3b8; }
    /* Time picker */
    .time-sel-row { display: flex; align-items: center; gap: 10px; justify-content: center; padding: 4px 0; }
    .time-sel { font-size: 1.6rem; background: #0b1220; border: 1px solid #2b4258; color: #e5e7eb; border-radius: 10px; padding: 10px 6px; width: 80px; text-align: center; text-align-last: center; cursor: pointer; }
    .time-colon { font-size: 1.6rem; color: #e5e7eb; font-weight: 700; }
    /* Count popup */
    .count-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .pop-cnt-btn { height: 44px; border: 1px solid #2b4258; border-radius: 8px; background: #0b1220; color: #94a3b8; font-size: 1.05rem; cursor: pointer; font-family: inherit; }
    .pop-cnt-btn.sel { background: #2ed3c6; color: #06212b; font-weight: 700; border-color: #2ed3c6; }
    /* Club toggle */
    .club-toggle-row { display: flex; gap: 12px; }
    .club-toggle-btn { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #2b4258; background: #0b1220; color: #94a3b8; font-size: 1rem; cursor: pointer; font-family: inherit; text-align: center; }
    .club-toggle-btn.sel { background: #1e3a4a; color: #93c5fd; border-color: #93c5fd; font-weight: 700; }
    /* Date input in popup */
    .popup-date-input { width: 100%; padding: 12px; background: #0b1220; border: 1px solid #2b4258; border-radius: 8px; color: #e5e7eb; font-size: 1rem; text-align: center; }
    /* Dashboard */
    .dash-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .dash-card { flex: 1; min-width: 0; border: 1px solid; border-radius: 10px; padding: 12px; background: #111827; }
    .dash-card .k { font-size: 0.7rem; }
    .dash-card .v { font-size: 1.1rem; font-weight: 700; margin-top: 4px; }
    .dc-blue  { border-color: #1d4ed8; }  .dc-blue  .k { color: #93c5fd; } .dc-blue  .v { color: #bfdbfe; }
    .dc-green { border-color: #065f46; }  .dc-green .k { color: #6ee7b7; } .dc-green .v { color: #a7f3d0; }
    .dc-purple{ border-color: #4c1d95; }  .dc-purple.k { color: #c4b5fd; } .dc-purple .v { color: #ddd6fe; }
    .dc-amber { border-color: #78350f; }  .dc-amber .k { color: #fcd34d; } .dc-amber .v { color: #fde68a; }
    .empty { color: #94a3b8; padding: 24px; text-align: center; }
    .section-title { font-size: 0.9rem; font-weight: 600; color: #9ccce6; margin: 0 0 12px; }
    /* ToDo */
    .btn-todo-add { background: #2ed3c6; color: #06212b; border: none; border-radius: 8px; padding: 6px 14px; font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #1e2d3d; }
    .todo-circle { flex-shrink: 0; width: 24px; height: 24px; border: 2px solid #4b9ecf; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
    .todo-circle.done { background: #4b9ecf; border-color: #4b9ecf; }
    .todo-circle.done::after { content: '✓'; color: #06212b; font-size: 0.75rem; font-weight: 700; }
    .todo-text { flex: 1; font-size: 0.9rem; color: #e5e7eb; line-height: 1.5; word-break: break-all; }
    .todo-text.done { text-decoration: line-through; color: #4b5563; }
    .todo-del { background: transparent; border: none; color: #4b5563; font-size: 1rem; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
    .todo-del:hover { color: #ef4444; }
    /* add-input */
    .todo-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .todo-add-input { flex: 1; background: #0b1220; border: 1px solid #2b4258; border-radius: 8px; color: #e5e7eb; font-size: 0.9rem; padding: 9px 12px; font-family: inherit; }
    .todo-add-input:focus { outline: none; border-color: #2ed3c6; }
    .todo-add-ok { background: #2ed3c6; color: #06212b; border: none; border-radius: 8px; padding: 9px 14px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 0.88rem; }
  </style>
</head>
<body>
  <header class="app-header">
    <img class="app-header-logo" src="./app_logo.jpg" alt="" width="36" height="36" />
    <div class="header-main">
      <div class="header-title-line">Gym <span class="ver" id="verInline"></span></div>
      <div class="header-user" id="headerUser"></div>
    </div>
  </header>
  <div class="meta-strip" id="metaStrip">読み込み中…</div>

  <div class="tab-bar">
    <button type="button" class="view-tab active" data-view="records">記録</button>
    <button type="button" class="view-tab" data-view="dash">ダッシュボード</button>
    <button type="button" class="view-tab" data-view="todo">ToDo</button>
    <span class="tab-spacer"></span>
    <button type="button" class="btn-new" id="btnNew">新規</button>
  </div>

  <main id="viewRecords" class="panel">
    <div id="recEmpty" class="empty" style="display:none;">記録がありません</div>
    <div class="table-wrap" id="tableWrap" style="display:none;">
      <table class="rec-table">
        <thead>
          <tr>
            <th>日付</th><th>開始</th><th>終了</th><th>有</th><th>1</th><th>2</th><th>C</th><th>送迎</th><th></th>
          </tr>
        </thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>
  </main>

  <main id="viewDash" class="panel" style="display:none;">
    <p class="section-title">直近30日</p>
    <div id="dashCards"></div>
    <div id="dashEmpty" class="empty" style="display:none;">データがありません</div>
  </main>

  <main id="viewTodo" class="panel" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <p class="section-title" style="margin:0;">ToDo</p>
      <button type="button" class="btn-todo-add" id="btnTodoAdd">＋ 追加</button>
    </div>
    <div id="todoList"></div>
    <div id="todoEmpty" class="empty" style="display:none;">やることはありません</div>
  </main>

  <!-- Popup -->
  <div id="popupOverlay" class="popup-overlay" style="display:none;">
    <div class="popup-box">
      <div class="popup-title" id="popupTitle"></div>
      <div id="popupContent"></div>
      <div class="popup-actions" id="popupActions">
        <button id="popupCancel" class="btn btn-ghost">キャンセル</button>
        <button id="popupOk" class="btn btn-primary">OK</button>
      </div>
    </div>
  </div>

  <script>
    window.__CONFIG_URL__ = 'https://script.google.com/macros/s/AKfycbyHavAxE_M6X8irQFverVbe0FKbubaYtQ5jP-zd3r7bRzEXW6aKTjE4oLrT3VBPuLew/exec';
    window.__API_BASE__ = window.__CONFIG_URL__;
    window.__LIFF_ID__ = '';
    window.__APP_VERSION__ = '';

    // ---- Utilities ----
    function todayJstYmd() {
      var p = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(new Date());
      var y='',m='',d='';
      p.forEach(function(x){ if(x.type==='year')y=x.value; if(x.type==='month')m=x.value; if(x.type==='day')d=x.value; });
      return y+'-'+m+'-'+d;
    }
    function nowJstHm() {
      var p = new Intl.DateTimeFormat('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit', hour12: false }).formatToParts(new Date());
      var h='',m='';
      p.forEach(function(x){ if(x.type==='hour')h=x.value.padStart(2,'0'); if(x.type==='minute')m=x.value.padStart(2,'0'); });
      return h+':'+m;
    }
    function addMinutes(hm, mins) {
      var p=String(hm||'00:00').split(':');
      var t=parseInt(p[0])*60+parseInt(p[1])+mins;
      t=((t%1440)+1440)%1440;
      return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
    }
    function minutesBetween(ts, te, ymd) {
      var ma=String(ts||'').match(/^(\d{1,2}):(\d{2})$/);
      var mb=String(te||'').match(/^(\d{1,2}):(\d{2})$/);
      if(!ma||!mb) return null;
      var d0=new Date(ymd+'T'+ma[1].padStart(2,'0')+':'+ma[2]+':00+09:00');
      var d1=new Date(ymd+'T'+mb[1].padStart(2,'0')+':'+mb[2]+':00+09:00');
      if(isNaN(d0)||isNaN(d1)) return null;
      var diff=(d1-d0)/60000;
      return Math.round(diff<0?diff+1440:diff);
    }
    function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
    function hmToSel(hm) {
      var p=String(hm||'').split(':');
      var h=parseInt(p[0])||0;
      var m=Math.round((parseInt(p[1])||0)/5)*5;
      if(m>=60){m=0;h=(h+1)%24;}
      return {h:h,m:m};
    }

    // ---- Config & Auth ----
    async function fetchConfig() {
      var r=await fetch(window.__CONFIG_URL__+'?_path=config');
      var c=await r.json();
      window.__LIFF_ID__=c.liff_id||'';
      window.__APP_VERSION__=c.version||'';
    }
    function applyVersionLabel() {
      var v=String(window.__APP_VERSION__||'').trim();
      var t=v?'v'+v:'';
      document.getElementById('verInline').textContent=t;
      document.title='Gym'+(t?' '+t:'');
    }
    var DEV_TOKEN=new URLSearchParams(location.search).get('dev')||'';
    var IS_DEV=DEV_TOKEN.length>0;
    var lineUserId='';
    function apiUrl(path){
      var b=(window.__API_BASE__||'').replace(/\/$/,'');
      var p=path.split('?');
      return b+'?_path='+encodeURIComponent(p[0])+(p[1]?'&'+p[1]:'');
    }
    function loadScript(src){
      return new Promise(function(res,rej){
        var s=document.createElement('script'); s.src=src; s.onload=res;
        s.onerror=function(){rej(new Error('script load failed'));};
        document.head.appendChild(s);
      });
    }
    function authQ(){
      return IS_DEV?('&dev_token='+encodeURIComponent(DEV_TOKEN)+'&userId=dev-claude'):('&userId='+encodeURIComponent(lineUserId||''));
    }
    async function fetchWithAuth(path, opts) {
      var o=opts||{};
      var method=(o.method||'GET').toUpperCase();
      if(method==='POST'&&o.body){
        var b=JSON.parse(o.body);
        b.userId=lineUserId; b._path=path.split('?')[0];
        if(IS_DEV) b.dev_token=DEV_TOKEN;
        o=Object.assign({},o,{body:JSON.stringify(b)});
        return fetch(window.__API_BASE__,Object.assign({},o,{method:'POST'})).catch(function(){
          return fetch(apiUrl(path)+authQ(),o);
        });
      }
      return fetch(apiUrl(path)+authQ(),o);
    }
    async function apiMe(){ return (await fetchWithAuth('auth/me')).json(); }
    async function apiListVisits(from,to){
      var q=(from&&to)?('from='+encodeURIComponent(from)+'&to='+encodeURIComponent(to)):'';
      return (await fetchWithAuth('api/gym/visits'+(q?'?'+q:''))).json();
    }
    async function apiSaveVisit(payload){
      try{
        var r=await fetchWithAuth('api/gym/visits',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({_path:'api/gym/visits'},payload))});
        return r.json();
      }catch(e){
        var q=new URLSearchParams();
        Object.keys(payload).forEach(function(k){ q.set(k,payload[k]==null?'':String(payload[k])); });
        return (await fetchWithAuth('api/gym/visits/save?'+q.toString())).json();
      }
    }
    async function apiDeleteVisit(id){
      return (await fetch(apiUrl('api/gym/visits/delete')+authQ()+'&id='+encodeURIComponent(id))).json();
    }
    function setMeta(s){ document.getElementById('metaStrip').textContent=s; }

    // ---- State ----
    var allRecords=[];
    var savingSet=new Set();
    var dashLoaded=false;

    // ---- Tab switching ----
    function switchView(name){
      document.querySelectorAll('.view-tab').forEach(function(t){
        t.classList.toggle('active',t.getAttribute('data-view')===name);
      });
      document.getElementById('viewRecords').style.display=name==='records'?'block':'none';
      document.getElementById('viewDash').style.display=name==='dash'?'block':'none';
      document.getElementById('viewTodo').style.display=name==='todo'?'block':'none';
      if(name==='dash') loadDashboard();
      if(name==='todo') renderTodos();
    }
    document.querySelectorAll('.view-tab').forEach(function(btn){
      btn.addEventListener('click',function(){ switchView(btn.getAttribute('data-view')); });
    });

    // ---- Popup system ----
    var _popResolve=null;
    var _popType=null;

    function _openPopup(title, contentHtml, type, actions) {
      // actions: 'ok-cancel' | 'cancel' | 'none'
      document.getElementById('popupTitle').textContent=title;
      document.getElementById('popupContent').innerHTML=contentHtml;
      var okBtn=document.getElementById('popupOk');
      var cancelBtn=document.getElementById('popupCancel');
      okBtn.style.display=(actions==='ok-cancel')?'':'none';
      cancelBtn.style.display=(actions!=='none')?'':'none';
      document.getElementById('popupActions').style.display=(actions==='none')?'none':'flex';
      document.getElementById('popupOverlay').style.display='flex';
      _popType=type;
      return new Promise(function(res){ _popResolve=res; });
    }
    function _resolvePopup(val){
      document.getElementById('popupOverlay').style.display='none';
      if(_popResolve){ _popResolve(val); _popResolve=null; }
    }
    document.getElementById('popupCancel').addEventListener('click',function(){ _resolvePopup(null); });
    document.getElementById('popupOverlay').addEventListener('click',function(e){ if(e.target===this) _resolvePopup(null); });
    document.getElementById('popupOk').addEventListener('click',function(){
      if(_popType==='date'){
        _resolvePopup(document.getElementById('popDate').value||null);
      } else if(_popType==='time'){
        var h=document.getElementById('selH').value.padStart(2,'0');
        var m=document.getElementById('selM').value.padStart(2,'0');
        _resolvePopup(h+':'+m);
      }
    });

    function popupDate(val){
      var p=_openPopup('日付','<input type="date" id="popDate" class="popup-date-input">','date','ok-cancel');
      setTimeout(function(){ var i=document.getElementById('popDate'); if(i) i.value=val||todayJstYmd(); },0);
      return p;
    }
    function popupTime(label, val){
      var t=hmToSel(val);
      var hOpts=''; for(var i=0;i<24;i++){ var hh=String(i).padStart(2,'0'); hOpts+='<option value="'+hh+'"'+(i===t.h?' selected':'')+'>'+hh+'</option>'; }
      var mOpts=''; for(var j=0;j<60;j+=5){ var mm=String(j).padStart(2,'0'); mOpts+='<option value="'+mm+'"'+(j===t.m?' selected':'')+'>'+mm+'</option>'; }
      var html='<div class="time-sel-row"><select id="selH" class="time-sel">'+hOpts+'</select><span class="time-colon">:</span><select id="selM" class="time-sel">'+mOpts+'</select></div>';
      return _openPopup(label,html,'time','ok-cancel');
    }
    function popupCount(label, val){
      var cur=parseInt(val)||0;
      var html='<div class="count-grid">';
      for(var i=0;i<=10;i++) html+='<button type="button" class="pop-cnt-btn'+(i===cur?' sel':'')+'" data-v="'+i+'">'+i+'</button>';
      html+='</div>';
      var p=_openPopup(label,html,'count','none');
      setTimeout(function(){
        document.querySelectorAll('.pop-cnt-btn').forEach(function(btn){
          btn.addEventListener('click',function(){ _resolvePopup(parseInt(btn.dataset.v)); });
        });
      },0);
      return p;
    }
    function popupClub(val){
      var isOn=val===true;
      var html='<div class="club-toggle-row">'+
        '<button type="button" class="club-toggle-btn'+(!isOn?' sel':'')+'" data-v="0">なし</button>'+
        '<button type="button" class="club-toggle-btn'+(isOn?' sel':'')+'" data-v="1">あり</button>'+
        '</div>';
      var p=_openPopup('Club',html,'club','none');
      setTimeout(function(){
        document.querySelectorAll('.club-toggle-btn').forEach(function(btn){
          btn.addEventListener('click',function(){ _resolvePopup(btn.dataset.v==='1'); });
        });
      },0);
      return p;
    }

    // ---- Records table ----
    function renderRecordsTable(){
      var sorted=allRecords.slice().sort(function(a,b){
        var da=String(a.visit_date||'').slice(0,10);
        var db=String(b.visit_date||'').slice(0,10);
        if(da!==db) return da>db?-1:1;
        return String(a.time_start||'')>String(b.time_start||'')?-1:1;
      });
      var empty=document.getElementById('recEmpty');
      var wrap=document.getElementById('tableWrap');
      if(sorted.length===0){ empty.style.display='block'; wrap.style.display='none'; return; }
      empty.style.display='none'; wrap.style.display='block';
      var html='';
      for(var i=0;i<sorted.length;i++){
        var v=sorted[i];
        var saving=savingSet.has(v.id);
        var ymd=String(v.visit_date||'').slice(0,10);
        var dateDisp=ymd.slice(5).replace('-','/');
        var clubHtml=v.club?'<span class="club-on">✓</span>':'<span class="club-off">−</span>';
        var okuriOn=v.okuri===true; var mukaeOn=v.mukae===true;
        var sgHtml='<div class="sougen-cell">'+
          '<button class="sg-btn'+(okuriOn?' on':'')+'" data-action="toggle-okuri" data-id="'+esc(v.id)+'"'+(saving?' disabled':'')+'>送</button>'+
          '<button class="sg-btn'+(mukaeOn?' on':'')+'" data-action="toggle-mukae" data-id="'+esc(v.id)+'"'+(saving?' disabled':'')+'>迎</button>'+
          '</div>';
        var rowCls=saving?' class="row-saving"':'';
        if(saving){
          html+='<tr'+rowCls+'>'+
            '<td>'+esc(dateDisp)+'</td>'+
            '<td>'+esc(v.time_start||'−')+'</td>'+
            '<td>'+esc(v.time_end||'−')+'</td>'+
            '<td>'+esc(v.aerobic_minutes||0)+'</td>'+
            '<td>'+esc(v.tr1_people||0)+'</td>'+
            '<td>'+esc(v.tr2_people||0)+'</td>'+
            '<td>'+clubHtml+'</td>'+
            '<td>'+sgHtml+'</td>'+
            '<td><span class="saving-txt">更新中…</span></td>'+
            '</tr>';
        } else {
          var id=esc(v.id);
          function cell(field,content){
            return '<td class="cell-edit" data-action="edit" data-id="'+id+'" data-field="'+field+'">'+content+'</td>';
          }
          html+='<tr>'+
            cell('visit_date',esc(dateDisp))+
            cell('time_start',esc(v.time_start||'−'))+
            cell('time_end',esc(v.time_end||'−'))+
            cell('aerobic_minutes',esc(v.aerobic_minutes||0))+
            cell('tr1_people',esc(v.tr1_people||0))+
            cell('tr2_people',esc(v.tr2_people||0))+
            cell('club',clubHtml)+
            '<td>'+sgHtml+'</td>'+
            '<td><button class="btn-delete" data-action="delete" data-id="'+id+'">Delete</button></td>'+
            '</tr>';
        }
      }
      document.getElementById('tblBody').innerHTML=html;
    }

    // ---- Event delegation on table ----
    document.getElementById('tblBody').addEventListener('click',async function(e){
      var el=e.target.closest('[data-action]');
      if(!el) return;
      var action=el.dataset.action;
      var id=el.dataset.id;
      if(savingSet.has(id)) return;

      if(action==='delete'){
        if(!confirm('この記録を削除しますか？')) return;
        el.disabled=true;
        try{
          var r=await apiDeleteVisit(id);
          if(r.error) throw new Error(r.error);
          allRecords=allRecords.filter(function(v){ return v.id!==id; });
          dashLoaded=false;
          renderRecordsTable();
        }catch(ex){ alert('削除エラー: '+String(ex.message||ex)); el.disabled=false; }
        return;
      }

      if(action==='toggle-okuri'||action==='toggle-mukae'){
        var field=action==='toggle-okuri'?'okuri':'mukae';
        var rec=allRecords.find(function(v){ return v.id===id; });
        if(!rec) return;
        await saveField(id, field, !rec[field]);
        return;
      }

      if(action==='edit'){
        var field=el.dataset.field;
        var rec=allRecords.find(function(v){ return v.id===id; });
        if(!rec) return;
        var newVal=null;
        if(field==='visit_date')        newVal=await popupDate(rec.visit_date);
        else if(field==='time_start')   newVal=await popupTime('開始時刻', rec.time_start||nowJstHm());
        else if(field==='time_end')     newVal=await popupTime('終了時刻', rec.time_end||addMinutes(rec.time_start||nowJstHm(),90));
        else if(field==='aerobic_minutes') newVal=await popupCount('有酸素人数', rec.aerobic_minutes||0);
        else if(field==='tr1_people')   newVal=await popupCount('TR1 人数', rec.tr1_people||0);
        else if(field==='tr2_people')   newVal=await popupCount('TR2 人数', rec.tr2_people||0);
        else if(field==='club')         newVal=await popupClub(rec.club||false);
        if(newVal===null) return;
        await saveField(id, field, newVal);
      }
    });

    async function saveField(id, field, newVal){
      var idx=allRecords.findIndex(function(v){ return v.id===id; });
      if(idx<0) return;
      var prev=Object.assign({},allRecords[idx]);
      var upd=Object.assign({},prev);
      upd[field]=newVal;
      allRecords[idx]=upd;
      savingSet.add(id);
      renderRecordsTable();
      try{
        var r=await apiSaveVisit({
          id:upd.id, visit_date:upd.visit_date,
          time_start:upd.time_start||'', time_end:upd.time_end||'',
          aerobic_minutes:upd.aerobic_minutes||0,
          tr1_people:upd.tr1_people||0, tr2_people:upd.tr2_people||0,
          club:upd.club||false, okuri:upd.okuri||false, mukae:upd.mukae||false,
        });
        if(r.error) throw new Error(r.error);
        allRecords[idx]=Object.assign({},r.visit,{
          club: r.visit.club===true,
          okuri: r.visit.okuri===true,
          mukae: r.visit.mukae===true,
        });
        dashLoaded=false;
      }catch(e){
        allRecords[idx]=prev;
        alert('保存エラー: '+(e.message||e));
      }finally{
        savingSet.delete(id);
        renderRecordsTable();
      }
    }

    async function loadRecords(){
      try{
        var j=await apiListVisits('2020-01-01',todayJstYmd());
        if(j.ok&&j.visits){ allRecords=j.visits; renderRecordsTable(); }
        else document.getElementById('recEmpty').style.display='block';
      }catch(e){ document.getElementById('recEmpty').style.display='block'; }
    }

    // ---- New record ----
    document.getElementById('btnNew').addEventListener('click',async function(){
      var btn=this; btn.disabled=true;
      try{
        var startHm=nowJstHm();
        var endHm=addMinutes(startHm,90);
        var r=await apiSaveVisit({visit_date:todayJstYmd(),time_start:startHm,time_end:endHm,okuri:false,mukae:false});
        if(r.error) throw new Error(r.error);
        var saved=r.visit;
        var idx=allRecords.findIndex(function(v){ return v.id===saved.id; });
        if(idx>=0) allRecords[idx]=saved; else allRecords.push(saved);
        dashLoaded=false;
        renderRecordsTable();
      }catch(e){ alert('エラー: '+(e.message||e)); }
      btn.disabled=false;
    });

    // ---- Dashboard ----
    async function loadDashboard(){
      if(dashLoaded) return;
      var today=todayJstYmd();
      var from=(function(){
        var p=new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date(Date.now()-30*86400000));
        var y='',m='',d=''; p.forEach(function(x){ if(x.type==='year')y=x.value; if(x.type==='month')m=x.value; if(x.type==='day')d=x.value; });
        return y+'-'+m+'-'+d;
      })();
      var j; try{ j=await apiListVisits(from,today); }catch(e){ document.getElementById('dashEmpty').style.display='block'; return; }
      if(j.error||!j.ok||!j.visits||!j.visits.length){ document.getElementById('dashEmpty').style.display='block'; return; }
      dashLoaded=true;
      var rows=j.visits, n=rows.length, sumStay=0, stayCnt=0, sumAero=0, sumTr1=0, sumTr2=0, clubCnt=0, okuriCnt=0, mukaeCnt=0;
      rows.forEach(function(v){
        var s=minutesBetween(v.time_start,v.time_end,String(v.visit_date||'').slice(0,10));
        if(typeof s==='number'){ sumStay+=s; stayCnt++; }
        sumAero+=parseInt(v.aerobic_minutes,10)||0;
        sumTr1+=parseInt(v.tr1_people,10)||0;
        sumTr2+=parseInt(v.tr2_people,10)||0;
        if(v.club===true) clubCnt++;
        if(v.okuri===true) okuriCnt++;
        if(v.mukae===true) mukaeCnt++;
      });
      var sougenTotal=okuriCnt+mukaeCnt;
      var savingAmt=sougenTotal*500;
      function card(k,v,cls){
        return '<div class="dash-card '+cls+'"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+'</div></div>';
      }
      function row(html){ return '<div class="dash-row">'+html+'</div>'; }
      var avgStay=stayCnt?Math.round(sumStay/stayCnt):0;
      document.getElementById('dashEmpty').style.display='none';
      document.getElementById('dashCards').innerHTML=
        row(
          card('記録数',n+'回','dc-blue')+
          card('Club利用数',clubCnt+'回','dc-blue')+
          card('送迎回数',sougenTotal+'回','dc-blue')
        )+
        row(
          card('1回当たり',n?'¥'+Math.round(7678/n).toLocaleString('ja-JP'):'-','dc-green')+
          card('Club 1回',clubCnt?'¥'+Math.round(1650/clubCnt).toLocaleString('ja-JP'):'-','dc-green')+
          card('JY交通費節約(片道500)','¥'+savingAmt.toLocaleString('ja-JP'),'dc-green')
        )+
        row(card('滞在合計',sumStay+'分','dc-purple')+card('平均滞在',avgStay+'分','dc-purple'))+
        row(card('有酸素平均',(sumAero/n).toFixed(1)+'人','dc-amber')+card('TR1 平均',(sumTr1/n).toFixed(1)+'人','dc-amber')+card('TR2 平均',(sumTr2/n).toFixed(1)+'人','dc-amber'));
    }

    // ---- ToDo ----
    var TODO_KEY='gymapp_todos';
    var allTodos=[];
    (function(){ try{ var s=localStorage.getItem(TODO_KEY); if(s) allTodos=JSON.parse(s); }catch(e){} })();
    function saveTodos(){ try{ localStorage.setItem(TODO_KEY,JSON.stringify(allTodos)); }catch(e){} }
    function renderTodos(){
      var undone=allTodos.filter(function(t){ return !t.done; }).sort(function(a,b){ return a.createdAt-b.createdAt; });
      var done=allTodos.filter(function(t){ return t.done; }).sort(function(a,b){ return a.createdAt-b.createdAt; });
      var list=undone.concat(done);
      var el=document.getElementById('todoList');
      var empty=document.getElementById('todoEmpty');
      if(list.length===0){ el.innerHTML=''; empty.style.display='block'; return; }
      empty.style.display='none';
      var html='';
      list.forEach(function(t){
        html+='<div class="todo-item" data-id="'+esc(t.id)+'">'+
          '<div class="todo-circle'+(t.done?' done':'')+'" data-todo-toggle="'+esc(t.id)+'"></div>'+
          '<span class="todo-text'+(t.done?' done':'')+'">'+esc(t.text)+'</span>'+
          '<button class="todo-del" data-todo-del="'+esc(t.id)+'" title="削除">×</button>'+
          '</div>';
      });
      el.innerHTML=html;
    }
    document.getElementById('todoList').addEventListener('click',function(e){
      var tg=e.target.closest('[data-todo-toggle]');
      if(tg){
        var id=tg.dataset.todoToggle;
        var t=allTodos.find(function(x){ return x.id===id; });
        if(t){ t.done=!t.done; saveTodos(); renderTodos(); }
        return;
      }
      var dl=e.target.closest('[data-todo-del]');
      if(dl){
        var id=dl.dataset.todoDel;
        if(!confirm('このタスクを削除しますか？')) return;
        allTodos=allTodos.filter(function(x){ return x.id!==id; });
        saveTodos(); renderTodos();
      }
    });
    var _todoAddMode=false;
    document.getElementById('btnTodoAdd').addEventListener('click',function(){
      if(_todoAddMode) return;
      _todoAddMode=true;
      var row=document.createElement('div');
      row.className='todo-add-row';
      row.innerHTML='<input class="todo-add-input" id="todoNewInput" placeholder="やること…" maxlength="200"><button class="todo-add-ok" id="todoNewOk">追加</button>';
      document.getElementById('viewTodo').insertBefore(row,document.getElementById('todoList'));
      var inp=document.getElementById('todoNewInput');
      inp.focus();
      function commit(){
        var txt=(inp.value||'').trim();
        if(txt){
          allTodos.push({id:'t-'+Date.now(),text:txt,done:false,createdAt:Date.now()});
          saveTodos();
        }
        row.parentNode.removeChild(row);
        _todoAddMode=false;
        renderTodos();
      }
      document.getElementById('todoNewOk').addEventListener('click',commit);
      inp.addEventListener('keydown',function(e){ if(e.key==='Enter') commit(); if(e.key==='Escape'){ row.parentNode.removeChild(row); _todoAddMode=false; } });
    });

    // ---- Init ----
    (async function main(){
      try{
        await fetchConfig();
        applyVersionLabel();
        await loadScript('https://static.line-scdn.net/liff/edge/2/sdk.js');
        var liffId=(window.__LIFF_ID__||'').trim();
        if(!liffId){ setMeta('LIFF_ID 未設定'); return; }
        await liff.init({liffId:liffId});
        if(!liff.isLoggedIn()){ liff.login({redirectUri:location.href.split('#')[0]}); return; }
        var prof=await liff.getProfile();
        lineUserId=prof.userId;
        document.getElementById('headerUser').textContent=prof.displayName||lineUserId;
        var me=await apiMe();
        if(!me.ok||!me.access_granted){ setMeta('この LINE アカウントは未許可です'); return; }
        setMeta('接続済み · '+todayJstYmd());
        loadRecords();
      }catch(e){
        setMeta('初期化エラー: '+String((e&&e.message)?e.message:e||'').trim());
      }
    })();
  </script>
</body>
